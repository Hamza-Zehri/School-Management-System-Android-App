name: school_manager
description: Offline School Management System for Android - v2 with Employee Management
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # File system & storage
  path_provider: ^2.1.3
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  share_plus: ^10.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Excel import
  excel: ^4.0.6

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # SMS via Android SIM
  telephony: ^0.2.0

  # UI & utilities
  intl: ^0.20.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  image_picker: ^1.1.2
  uuid: ^4.4.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/templates/
